<div class="dashboard-container">
  <app-sidebar
    [activeTab]="activeTab"
    [collapsed]="sidebarCollapsed"
    (tabChange)="activeTab = $event"
  >
  </app-sidebar>
  <app-header-bar
    [userInfo]="userInfo"
    [currentDate]="currentDate"
    (toggleSidebar)="toggleSidebar()"
  >
  </app-header-bar>
  <main
    class="main-content"
    [ngClass]="{ 'sidebar-collapsed': sidebarCollapsed }"
  >
    <div class="page-header">
      <div>
        <h1 class="page-title">
          <ng-container [ngSwitch]="activeTab">
            <span *ngSwitchCase="'dashboard'">Overview Dashboard</span>
            <span *ngSwitchCase="'calendar'">Booking Calendar</span>
            <span *ngSwitchCase="'guests'">Guests Data Center</span>
            <span *ngSwitchCase="'services'">Services Management</span>
            <span *ngSwitchCase="'stats'">Analytics &amp; Statistics</span>
            <span *ngSwitchCase="'settings'">Admin Settings</span>
            <span *ngSwitchDefault>Dashboard</span>
          </ng-container>
        </h1>
        <p class="page-subtitle">Welcome to Katsura's Resort Dashboard</p>
      </div>
      <div class="filters">
        <div class="date-filter">
          <span>{{ currentDate }}</span>
          <span class="material-icons">arrow_drop_down</span>
        </div>
      </div>
    </div>

    <!-- Tab Content -->
    <ng-container [ngSwitch]="activeTab">
      <app-admin-overview *ngSwitchCase="'dashboard'"></app-admin-overview>
      <app-admin-calendar *ngSwitchCase="'calendar'"></app-admin-calendar>

      <div *ngSwitchCase="'guests'" class="tab-content">
        <app-guest-table></app-guest-table>
      </div>

      <app-admin-services *ngSwitchCase="'services'"></app-admin-services>
      <app-admin-stats *ngSwitchCase="'stats'"></app-admin-stats>
      <app-admin-settings *ngSwitchCase="'settings'" [userInfo]="userInfo"></app-admin-settings>
    </ng-container>
  </main>
</div>
